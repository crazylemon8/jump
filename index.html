<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump</title>
  </head>
  <body>
    <div id="app-shell">
      <div id="app"></div>
      <div id="hud-red" class="hud-score" aria-live="polite"></div>
      <div id="hud-mistakes" class="hud-score" aria-live="polite"></div>
      <div id="hud-green" class="hud-score" aria-live="polite"></div>
      <div id="hud-pause" class="hud-pause">
        <button id="pause-button" class="hud-pause-button" type="button">Pause</button>
      </div>
      <div id="game-start" class="game-overlay">
        <div class="game-dialog">
          <p class="game-dialog-label">Gatekeeper Briefing</p>
          <p class="game-dialog-text">
            Red skeletons must fall left. Green skeletons must fall right. Hold the ledge and sort the dead.
          </p>
          <p class="game-countdown">Press any key to start</p>
        </div>
      </div>
      <div id="game-pause" class="game-overlay" hidden>
        <div class="game-dialog">
          <p class="game-dialog-label">Paused</p>
          <p class="game-dialog-text">Press any key or the pause button to resume guarding the gate.</p>
        </div>
      </div>
      <div id="game-over" class="game-overlay" hidden>
        <div class="game-dialog">
          <p class="game-dialog-label">Gate Closed</p>
          <p class="game-dialog-text">Too many souls slipped through. Hold the line again.</p>
          <p id="final-score" class="game-dialog-score"></p>
          <button id="retry-button" class="game-dialog-button" type="button">Retry</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
